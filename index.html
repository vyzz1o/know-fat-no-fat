<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🏆 脂己脂彼 百戰百勝</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--surface:#161a23;--card:#1e2433;--border:#2a3148;--accent:#f5a623;--green:#4cde8f;--red:#f05c6e;--blue:#5b9cf6;--text:#e8eaf0;--muted:#7a8299}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.nav-title{font-weight:800;font-size:15px;color:var(--accent);cursor:pointer}
main{max-width:900px;margin:0 auto;padding:20px 14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
h2{font-size:16px;font-weight:700;margin-bottom:12px}
label{font-size:12px;color:var(--muted);margin-bottom:4px;display:block}
input,textarea,select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;width:100%;outline:none;margin-bottom:10px}
textarea{height:80px;resize:none}
.btn{border:none;border-radius:8px;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .15s}
.btn-primary{background:var(--accent);color:#000;width:100%}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-red{background:var(--red);color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:12px;font-weight:700;cursor:pointer}
.page{display:none}.page.active{display:block}
.countdown-box{background:linear-gradient(135deg,#1e2433,#161a23);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;margin-bottom:14px}
.countdown-nums{display:flex;justify-content:center;gap:10px;margin-top:10px}
.countdown-unit{background:var(--surface);border-radius:8px;padding:8px 12px;min-width:50px}
.countdown-num{font-size:20px;font-weight:800;color:var(--accent)}
.countdown-lbl{font-size:10px;color:var(--muted)}
.prize-banner{background:linear-gradient(135deg,#f5a62315,#f5a62305);border:1px solid #f5a62333;border-radius:12px;padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #2a314820}
.lb-rank{font-size:18px;width:30px;text-align:center}
.lb-bar-wrap{flex:1;background:var(--surface);border-radius:4px;height:8px;overflow:hidden;margin:4px 0}
.lb-bar{height:8px;border-radius:4px;background:var(--accent)}
.goal-box{background:linear-gradient(135deg,#4cde8f15,#4cde8f05);border:1px solid #4cde8f33;border-radius:10px;padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.stat-label{font-size:10px;color:var(--muted);margin-bottom:2px}
.stat-val{font-size:14px;font-weight:800}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.tabs{display:flex;gap:4px;margin-bottom:18px;overflow-x:auto}
.tab{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--surface);color:var(--muted);white-space:nowrap}
.tab.active{background:var(--accent);color:#000}
.period-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--muted);font-size:12px;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.period-btn.active{background:#f05c6e20;border-color:var(--red);color:var(--red);}
table{width:100%;border-collapse:collapse;font-size:11px}
th,td{padding:8px;text-align:left;border-bottom:1px solid var(--border)}
.toast{position:fixed;bottom:22px;right:18px;z-index:9999;border-radius:10px;padding:11px 18px;font-size:13px;font-weight:700;display:none;box-shadow:0 4px 12px #000}
@media(max-width:520px){.grid4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<nav>
  <div class="nav-title" onclick="goPublic()">🏆 脂己脂彼</div>
  <div id="nav-right"><button class="btn btn-ghost" style="width:auto;padding:5px 12px" onclick="showPage('login')">登入</button></div>

<main>

    <div style="font-size:12px;color:var(--muted)">比賽結束倒數</div>
    <div style="font-size:13px;font-weight:700;margin-top:4px">2026/04/15 — 2026/06/24（共10週）</div>

  </div>
  <div class="prize-banner">
    <div>
      <div style="font-size:11px;color:var(--muted)">💰 當前獎金池</div>
      <div id="prize-amount" style="font-size:26px;font-weight:800;color:var(--accent)">NT$ 0</div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">體脂下降率達 7% 退 $2,000</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:11px;color:var(--muted)">參賽人數</div>
      <div id="prize-count" style="font-size:22px;font-weight:700">0</div>
      <div style="font-size:10px;color:var(--muted)">人 × NT$3,000</div>
    </div>
  </div>
  <div class="card">

    <div id="public-lb">載入數據中...</div>

  <div class="card">
    <h2>📈 全員體脂趨勢</h2>
    <div style="height:200px;"><canvas id="chart-public-fat"></canvas></div>
    <div id="chart-legend" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:11px"></div>

</main>

<div class="page" id="page-login">
  <div style="display:flex;align-items:center;justify-content:center;min-height:80vh;padding:20px">
    <div class="card" style="width:100%;max-width:320px;padding:28px">
      <h2 style="text-align:center;color:var(--accent)">參賽者登入</h2>
      <input id="login-id" placeholder="帳號">
      <input id="login-pw" type="password" placeholder="密碼">
      <button class="btn btn-primary" onclick="login()">登入系統</button>
      <button class="btn btn-ghost" style="margin-top:10px;width:100%" onclick="goPublic()">← 返回首頁</button>
    </div>

<main>
  <div id="user-goal-box"></div>
  <div id="user-score-bar"></div>
  <div class="tabs" id="user-tabs">
    <button class="tab active" onclick="userTab('mydata')">📊 我的數據</button>
    <button class="tab" onclick="userTab('addrecord')">➕ 新增測量</button>

  </div>
  <div id="utab-mydata"><div class="card"><h2>數據紀錄</h2><div id="user-record-list"></div></div></div>
  <div id="utab-addrecord" style="display:none">
    <div class="card">
      <h2>➕ 新增測量紀錄</h2>
      <label>測量日期</label><input type="date" id="rec-date">
      <label>體重 (kg)</label><input type="number" step="0.1" id="rec-weight">
      <label>體脂 (%)</label><input type="number" step="0.1" id="rec-bodyfat">
      <label>皮下脂肪率 (%)</label><input type="number" step="0.1" id="rec-subcut">
      <label>骨骼肌 (kg)</label><input type="number" step="0.1" id="rec-muscle">
      <label>內臟脂肪程度</label><input type="number" step="1" id="rec-visceral">
      <label>基礎代謝量 (kcal)</label><input type="number" step="1" id="rec-bmr">
      <label>身體年齡</label><input type="number" step="1" id="rec-bodyage">
      <div class="period-btn" id="period-toggle" onclick="this.classList.toggle('active')">

      <button class="btn btn-primary" id="btn-submit-rec" onclick="submitRecord()">送出審核</button>

  <div id="utab-diary" style="display:none">

<div class="page" id="page-admin">
<main>
  <div class="tabs" id="admin-tabs">
    <button class="tab active" onclick="adminTab('pending')">⏳ 審核</button>
    <button class="tab" onclick="adminTab('admin-add')">➕ 代錄</button>

      <h2>管理員代錄</h2>

      <input type="date" id="admin-rec-date">
      <input type="number" step="0.1" id="admin-rec-weight" placeholder="體重 (kg)">
      <input type="number" step="0.1" id="admin-rec-bodyfat" placeholder="體脂 (%)">
      <input type="number" step="0.1" id="admin-rec-subcut" placeholder="皮下脂肪率 (%)">
      <input type="number" step="0.1" id="admin-rec-muscle" placeholder="骨骼肌 (kg)">
      <input type="number" step="1" id="admin-rec-visceral" placeholder="內臟脂肪程度">
      <input type="number" step="1" id="admin-rec-bmr" placeholder="基礎代謝量 (kcal)">
      <input type="number" step="1" id="admin-rec-bodyage" placeholder="身體年齡">
      <button class="btn btn-primary" onclick="adminSubmitRecord()">錄入發佈</button>

  </div>
  <div id="atab-register" style="display:none">

    <div class="card"><h2>👥 參賽者清單</h2><div id="admin-user-list"></div></div>
  </div>

</main>

<div id="toast-el" class="toast"></div>

<script>
const firebaseConfig={apiKey:"AIzaSyD_s-anl91EMmC1TtmXNpVlyBcD7sYjzzk",authDomain:"fat-loss-game.firebaseapp.com",projectId:"fat-loss-game",storageBucket:"fat-loss-game.appspot.com",messagingSenderId:"280707290748",appId:"1:280707290748:web:aa7946aef2cc96cafe5bf9"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const END_DATE=new Date('2026-06-24T23:59:59'), PRIZE_PER=3000, PRIZE_BACK=2000, RATE_GOAL=0.07;
const COLORS=['#f5a623','#4cde8f','#5b9cf6','#c084fc','#fb7185','#38bdf8','#a78bfa','#f472b6'];
let CU=null, USERS_CACHE=[], publicChart=null;

function toast(msg,type='success'){const el=document.getElementById('toast-el');el.textContent=msg;el.style.background=type==='error'?'var(--red)':'var(--green)';el.style.color='#fff';el.style.display='block';setTimeout(()=>el.style.display='none',3000);}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');}
function goPublic(){showPage('public');loadPublicData();}
function updateNav(){const nr=document.getElementById('nav-right');nr.innerHTML=CU?`<button class="btn btn-primary" style="width:auto;padding:5px 12px;font-size:11px" onclick="goDashboard()">我的後台</button>`:`<button class="btn btn-ghost" style="width:auto;padding:5px 12px;font-size:11px" onclick="showPage('login')">登入</button>`;}
function goDashboard(){CU.role==='admin'?showPage('admin'):showPage('user');}
function logout(){CU=null;updateNav();goPublic();toast("已登出");}

function calculateFullStats(recs){
  if(recs.length<2) return {fatRate:0,weightRate:0,bonus:0,total:0,isWinner:false};
  const start=recs[0],last=recs[recs.length-1];
  const fRate=(start.bodyFat-last.bodyFat)/start.bodyFat;
  const wRate=(start.weight-last.weight)/start.weight;
  const nonPeriod=recs.filter(r=>!r.isPeriod);
  let upCount=0;
  if(nonPeriod.length>=2){for(let i=1;i<nonPeriod.length;i++){if(nonPeriod[i].bodyFat>nonPeriod[i-1].bodyFat)upCount++;}}
  const bonus=(upCount===0)?0.10:(upCount===1?0.05:0);
  const total=((fRate*0.7)+(wRate*0.3))*(1+bonus);
  const isWinner=fRate>=RATE_GOAL;
  return{fatRate:fRate*100,weightRate:wRate*100,bonus:bonus*100,total:total*100,isWinner};
}

async function loadPublicData(){
  try{
    const uSnap=await db.collection('users').get();
    const currentUsers=uSnap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.role==='user');
    USERS_CACHE=currentUsers;
    document.getElementById('prize-count').textContent=currentUsers.length;
    const rSnap=await db.collection('records').where('status','==','approved').get();
    const allRecords={}, adminRecords={};
    rSnap.docs.forEach(d=>{
      const r=d.data();
      if(!allRecords[r.userId])allRecords[r.userId]=[];
      allRecords[r.userId].push(r);
      if(r.adminEntered){
        if(!adminRecords[r.userId])adminRecords[r.userId]=[];
        adminRecords[r.userId].push(r);
      }
    });
    Object.keys(adminRecords).forEach(id=>adminRecords[id].sort((a,b)=>a.date.localeCompare(b.date)));
    let winners=0;
    const rows=currentUsers.map(u=>{const r=adminRecords[u.id]||[];const s=calculateFullStats(r);if(s.isWinner)winners++;return{id:u.id,name:u.name||u.id,score:s.total,history:r.map(rec=>rec.bodyFat)};}).sort((a,b)=>b.score-a.score);
    const finalAmount=(currentUsers.length*PRIZE_PER)-(winners*PRIZE_BACK);
    document.getElementById('prize-amount').textContent=`NT$ ${finalAmount.toLocaleString()}`;
    document.getElementById('public-lb').innerHTML=rows.map((u,i)=>`<div class="lb-row"><div class="lb-rank">${i<3?['🥇','🥈','🥉'][i]:'#'+(i+1)}</div><div style="flex:1"><div>${u.name}</div><div class="lb-bar-wrap"><div class="lb-bar" style="width:${Math.max(u.score*2,0)}%"></div></div></div><div style="font-size:12px;color:var(--accent);font-weight:700">${u.score.toFixed(2)}%</div></div>`).join('');
    renderTrendChart(rows);
    if(CU&&CU.role==='admin')updateAdminTargetSelect();
  }catch(e){console.error(e);}
}

function renderTrendChart(rows){
  const ctx=document.getElementById('chart-public-fat').getContext('2d');if(publicChart)publicChart.destroy();
  const maxLen=Math.max(...rows.map(r=>r.history.length),0);
  publicChart=new Chart(ctx,{type:'line',data:{labels:Array.from({length:maxLen},(_,i)=>`T${i+1}`),datasets:rows.map((u,i)=>({label:u.name,data:u.history,borderColor:COLORS[i%COLORS.length],tension:0.3}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
}

async function loadUserRecords(){
  if(!CU)return;
  const snap=await db.collection('records').where('userId','==',CU.id).get();
  const recs=snap.docs.map(doc=>({id:doc.id,...doc.data()})).sort((a,b)=>b.date.localeCompare(a.date));
  const app=[...recs].filter(r=>r.adminEntered&&r.status==='approved').sort((a,b)=>a.date.localeCompare(b.date));
  const gBox=document.getElementById('user-goal-box');
  const sBar=document.getElementById('user-score-bar');
  if(app.length>0){
    const s=calculateFullStats(app);
    const f=app[0],target=(f.bodyFat*(1-RATE_GOAL)).toFixed(1);
    gBox.innerHTML=`<div class="goal-box"><div><div style="font-size:10px;color:var(--muted)">🎯 目標：體脂下降率 7% (退款門檻)</div><div style="font-size:18px;font-weight:800;color:var(--green)">目標體脂 ≤ ${target}%</div></div><div>${s.isWinner?'✅ 已達標':'進行中'}</div></div>`;
    sBar.innerHTML=`<div class="grid4"><div class="stat-box"><div class="stat-label">體脂降率</div><div class="stat-val" style="color:var(--green)">${s.fatRate.toFixed(1)}%</div></div><div class="stat-box"><div class="stat-label">體重降率</div><div class="stat-val" style="color:var(--blue)">${s.weightRate.toFixed(1)}%</div></div><div class="stat-box"><div class="stat-label">穩定加分</div><div class="stat-val" style="color:var(--accent)">+${s.bonus.toFixed(0)}%</div></div><div class="stat-box"><div class="stat-label">總評分</div><div class="stat-val" style="color:var(--text)">${s.total.toFixed(2)}%</div></div></div>`;
  }
  const officialRecs = recs.filter(r=>r.adminEntered && r.status==='approved');
  const personalRecs = recs.filter(r=>!r.adminEntered);
  const renderTable = (list) => list.length===0?'<div style="color:var(--muted);font-size:12px;padding:8px 0">尚無紀錄</div>':`<div style="overflow-x:auto"><table><tr><th>日期</th><th>體重</th><th>體脂</th><th>皮下脂肪</th><th>骨骼肌</th><th>內臟脂肪</th><th>基代</th><th>身體年齡</th><th>生理</th><th>狀態</th><th>操作</th></tr>`+list.map(r=>{
    const statusTxt = r.status==='approved'?'✅':r.status==='delete_pending'?'🗑待刪除':r.status==='rejected'?'❌拒絕':'⏳審核中';
    const canDelete = r.status==='approved';
    return`<tr><td>${r.date}</td><td>${r.weight}kg</td><td>${r.bodyFat}%</td><td>${r.subcut!=null?r.subcut+'%':'--'}</td><td>${r.muscle!=null?r.muscle+'kg':'--'}</td><td>${r.visceral!=null?r.visceral:'--'}</td><td>${r.bmr!=null?r.bmr:'--'}</td><td>${r.bodyage!=null?r.bodyage:'--'}</td><td>${r.isPeriod?'🔴':'--'}</td><td>${statusTxt}</td><td>${canDelete?`<button class="btn-red" onclick="deleteRecord('${r.id}')">刪</button>`:''}</td></tr>`;
  }).join('')+`</table></div>`;
  document.getElementById('user-record-list').innerHTML=
    `<div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px">📋 計分紀錄（管理員錄入）</div>`+renderTable(officialRecs)+
    `<div style="font-size:12px;font-weight:700;color:var(--muted);margin-top:16px;margin-bottom:8px">📝 個人紀錄（僅供參考，不計分）</div>`+renderTable(personalRecs);
}

async function login(){
  const id=document.getElementById('login-id').value.trim(),pw=document.getElementById('login-pw').value;
  if(id==='knowfatnofat'&&pw==='knowfatnofat2026'){CU={id:'admin',role:'admin'};updateNav();showPage('admin');loadPending();loadAdminUserList();return;}
  const snap=await db.collection('users').doc(id).get();
  if(snap.exists&&snap.data().password===pw){CU={id,...snap.data()};updateNav();showPage('user');userTab('mydata');loadUserRecords();loadUserDiaries();}
  else toast('帳號或密碼錯誤','error');
}
async function submitRecord(){
  const w=document.getElementById('rec-weight').value,f=document.getElementById('rec-bodyfat').value,d=document.getElementById('rec-date').value,isP=document.getElementById('period-toggle').classList.contains('active');
  const subcut=document.getElementById('rec-subcut').value;
  const muscle=document.getElementById('rec-muscle').value;
  const visceral=document.getElementById('rec-visceral').value;
  const bmr=document.getElementById('rec-bmr').value;
  const bodyage=document.getElementById('rec-bodyage').value;
  if(!w||!f||!d)return toast("請填寫數據","error");
  const btn=document.getElementById('btn-submit-rec');btn.disabled=true;btn.innerText="上傳中...";
  await db.collection('records').add({userId:CU.id,weight:parseFloat(w),bodyFat:parseFloat(f),subcut:subcut?parseFloat(subcut):null,muscle:muscle?parseFloat(muscle):null,visceral:visceral?parseFloat(visceral):null,bmr:bmr?parseFloat(bmr):null,bodyage:bodyage?parseFloat(bodyage):null,date:d,isPeriod:isP,status:'pending',createdAt:Date.now()});
  toast("送審成功");btn.disabled=false;btn.innerText="送出審核";loadUserRecords();
}
async function submitDiary(){const c=document.getElementById('diary-content').value;if(!c)return;await db.collection('diaries').add({userId:CU.id,content:c,date:new Date().toLocaleDateString(),createdAt:Date.now()});document.getElementById('diary-content').value='';loadUserDiaries();}
async function loadUserDiaries(){const snap=await db.collection('diaries').where('userId','==',CU.id).orderBy('createdAt','desc').get();document.getElementById('diary-list').innerHTML=snap.docs.map(d=>`<div class="card" style="font-size:12px;margin-top:10px"><div style="color:var(--muted);margin-bottom:4px">${d.data().date}</div>${d.data().content}</div>`).join('');}
async function registerUser(){const id=document.getElementById('reg-id').value.trim(),n=document.getElementById('reg-name').value.trim(),p=document.getElementById('reg-pw').value;if(!id||!n||!p)return toast('請填寫所有欄位','error');await db.collection('users').doc(id).set({name:n,password:p,role:'user'});toast(`${n} 已建立`);loadAdminUserList();loadPublicData();}
async function deleteUser(id){if(!confirm("確定刪除？"))return;await db.collection('users').doc(id).delete();loadAdminUserList();loadPublicData();}
async function deleteRecord(id){if(!confirm("確定申請刪除？需管理員審核後才會正式刪除。"))return;await db.collection('records').doc(id).update({status:'delete_pending'});toast("已送出刪除申請，等待管理員審核");loadUserRecords();}
async function approveRecord(id){await db.collection('records').doc(id).update({status:'approved'});loadPending();loadPublicData();}
async function rejectRecord(id){await db.collection('records').doc(id).update({status:'rejected'});loadPending();toast("已拒絕");}
async function approveDelete(id){await db.collection('records').doc(id).delete();loadPending();loadPublicData();toast("已批准刪除");}
async function rejectDelete(id){await db.collection('records').doc(id).update({status:'approved'});loadPending();toast("已拒絕刪除申請");}
async function loadPending(){
  const snap=await db.collection('records').where('status','in',['pending','delete_pending']).get();
  if(snap.empty){document.getElementById('pending-list').innerHTML="目前無待審核資料";return;}
  document.getElementById('pending-list').innerHTML=snap.docs.map(doc=>{
    const r=doc.data();
    if(r.status==='delete_pending'){
      return`<div class="lb-row"><div style="flex:1"><span style="color:var(--red);font-weight:700">🗑 刪除申請</span> <strong>${r.userId}</strong>：體脂 ${r.bodyFat}%，體重 ${r.weight}kg，${r.date}</div><button class="btn btn-primary" style="width:auto;padding:5px 12px;background:var(--red);color:#fff;margin-right:6px" onclick="approveDelete('${doc.id}')">✓ 批准刪除</button><button class="btn-red" style="background:var(--surface);color:var(--muted);border:1px solid var(--border)" onclick="rejectDelete('${doc.id}')">✗ 拒絕</button></div>`;
    }
    return`<div class="lb-row"><div style="flex:1"><strong>${r.userId}</strong>：體脂 ${r.bodyFat}%，體重 ${r.weight}kg，${r.date} ${r.isPeriod?'🔴生理期':''}</div><button class="btn btn-primary" style="width:auto;padding:5px 12px;margin-right:6px" onclick="approveRecord('${doc.id}')">✓ 核准</button><button class="btn-red" onclick="rejectRecord('${doc.id}')">✗ 拒絕</button></div>`;
  }).join('');
}
async function loadAdminUserList(){const snap=await db.collection('users').get();const users=snap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.role==='user');document.getElementById('admin-user-list').innerHTML=users.length===0?'尚無參賽者':users.map(u=>`<div class="lb-row"><div style="flex:1"><strong>${u.name}</strong> <span style="color:var(--muted)">@${u.id}</span></div><button class="btn-red" onclick="deleteUser('${u.id}')">刪除</button></div>`).join('');}
function updateAdminTargetSelect(){const sel=document.getElementById('admin-target-user');if(sel)sel.innerHTML=USERS_CACHE.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');}
async function adminSubmitRecord(){
  const tid=document.getElementById('admin-target-user').value,w=document.getElementById('admin-rec-weight').value,f=document.getElementById('admin-rec-bodyfat').value,d=document.getElementById('admin-rec-date').value;
  const subcut=document.getElementById('admin-rec-subcut').value;
  const muscle=document.getElementById('admin-rec-muscle').value;
  const visceral=document.getElementById('admin-rec-visceral').value;
  const bmr=document.getElementById('admin-rec-bmr').value;
  const bodyage=document.getElementById('admin-rec-bodyage').value;
  if(!w||!f||!d)return toast('請填寫所有欄位','error');
  await db.collection('records').add({userId:tid,weight:parseFloat(w),bodyFat:parseFloat(f),subcut:subcut?parseFloat(subcut):null,muscle:muscle?parseFloat(muscle):null,visceral:visceral?parseFloat(visceral):null,bmr:bmr?parseFloat(bmr):null,bodyage:bodyage?parseFloat(bodyage):null,date:d,status:'approved',adminEntered:true,createdAt:Date.now()});
  toast('已錄入');loadPublicData();
}
function saveProfile(){db.collection('users').doc(CU.id).update({name:document.getElementById('profile-name').value});toast("更新成功");loadPublicData();}

function userTab(t){
  ['mydata','addrecord','diary','profile'].forEach(tab=>document.getElementById('utab-'+tab).style.display=tab===t?'block':'none');
  document.querySelectorAll('#user-tabs .tab').forEach((b,i)=>b.classList.toggle('active',i===['mydata','addrecord','diary','profile'].indexOf(t)));
}
function adminTab(t){
  ['pending','admin-add','register'].forEach(tab=>document.getElementById('atab-'+tab).style.display=tab===t?'block':'none');
  document.querySelectorAll('#admin-tabs .tab').forEach((b,i)=>b.classList.toggle('active',i===['pending','admin-add','register'].indexOf(t)));
  if(t==='admin-add') loadPublicData();
}

function tick(){const diff=END_DATE-new Date();if(diff<0){document.getElementById('countdown-display').innerHTML='<div style="color:var(--accent);font-weight:800">比賽已結束！</div>';return;}const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);document.getElementById('countdown-display').innerHTML=[['天',d],['時',h],['分',m],['秒',s]].map(([u,v])=>`<div class="countdown-unit"><div class="countdown-num">${String(v).padStart(2,'0')}</div><div class="countdown-lbl">${u}</div></div>`).join('');}
setInterval(tick,1000);tick();goPublic();
</script>
</body>
</html>
